apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin 
  namespace: media
spec:
  interval: 30m
  chart:
    spec:
      chart: jellyfin
      sourceRef:
        kind: HelmRepository
        name: jellyfin-helm
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            securityContext:
              privileged: false # HW acceleration
            image:
              repository: ghcr.io/jellyfin/jellyfin
              tag: latest
            env:
              # Timezone is important for air dates
              TZ: Europe/Berlin 
    service:
      main:
        controller: main
        ports:
          http:
            port: 8096 
    ingress:
      main:
        enabled: true
        className: nginx
        hosts:
          - host: jellyfin.local
            paths:
              - path: /
                service:
                  identifier: main
                  port: http
    
