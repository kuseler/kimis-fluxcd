apiVersion: v1
kind: Service
metadata:
  name: adguard-dns
  namespace: adguard
spec:
  ipFamilyPolicy: PreferDualStack
  ipFamilies:
  - IPv4
  - IPv6
  selector:
    app: adguard
  ports:
  - name: dns
    port: 53
    protocol: UDP
    targetPort: 53
  - name: dns-tcp
    port: 53
    protocol: TCP
    targetPort: 53
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  name: adguard-http
  namespace: adguard
spec:
  selector:
    app: adguard
  ports:
  - name: http
    port: 3000
    protocol: TCP
    targetPort: 3000
  type: ClusterIP
