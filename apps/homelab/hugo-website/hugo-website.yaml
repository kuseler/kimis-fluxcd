---
# Update HUGO_REPO_URL to the GitHub URL of your Hugo site repository.
# The site is cloned and built on every pod start; restart the pod to redeploy.
apiVersion: v1
kind: ConfigMap
metadata:
  name: hugo-website-config
  namespace: default
data:
  HUGO_REPO_URL: "https://github.com/kuseler/website"
  HUGO_REPO_BRANCH: "main"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hugo-website
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hugo-website
  template:
    metadata:
      labels:
        app: hugo-website
    spec:
      initContainers:
      - name: git-clone
        image: alpine/git:latest
        command:
          - sh
          - -c
          - "git clone --recurse-submodules --depth=1 --branch ${HUGO_REPO_BRANCH} ${HUGO_REPO_URL} /repo"
        env:
        - name: HUGO_REPO_URL
          valueFrom:
            configMapKeyRef:
              name: hugo-website-config
              key: HUGO_REPO_URL
        - name: HUGO_REPO_BRANCH
          valueFrom:
            configMapKeyRef:
              name: hugo-website-config
              key: HUGO_REPO_BRANCH
        volumeMounts:
        - name: repo
          mountPath: /repo
      - name: hugo-build
        image: hugomods/hugo:exts
        command:
          - hugo
          - --source
          - /repo
          - --destination
          - /public
          - --minify
        volumeMounts:
        - name: repo
          mountPath: /repo
        - name: public
          mountPath: /public
      containers:
      - name: web
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: public
          mountPath: /usr/share/nginx/html
      volumes:
      - name: repo
        emptyDir: {}
      - name: public
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: hugo-website-svc
  namespace: default
spec:
  selector:
    app: hugo-website
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hugo-website-ingress
  namespace: default
spec:
  ingressClassName: traefik
  rules:
  - host: kimimueller.de
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: hugo-website-svc
            port:
              number: 80
  - host: homelab.home
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: hugo-website-svc
            port:
              number: 80
