apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: coredns
data:
  Corefile: |
    .:53 {
        bind 0.0.0.0 ::
        errors
        log

        # 1. Match your specific Traefik domains FIRST
        rewrite stop name regex .*\.?homelab\.fritz\.box traefik-ingress.home
        rewrite stop name regex .*\.?homelab\.home traefik-ingress.home

        # 2. Dynamically translate ANY OTHER .home domain to .fritz.box
        # (.*) captures the hostname (like "nas") and {1} injects it into the new name
        rewrite stop name regex (.*)\.home {1}.fritz.box

        # 3. Resolve them to your Traefik IP (for the homelab rewrites above)
        hosts {
            192.168.1.80 traefik-ingress.home
            fallthrough
        }

        # 4. Forward unknown queries through AdGuard Home for ad/tracker filtering,
        # falling back to Fritz!Box and Google
        forward . adguard-dns.adguard.svc.cluster.local 192.168.1.1 8.8.8.8 2001:4860:4860::8888 {
            max_concurrent 1000
        }
    }
