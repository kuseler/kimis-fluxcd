apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin 
  namespace: media
spec:
  interval: 30m
  chart:
    spec:
      chart: jellyfin
      sourceRef:
        kind: HelmRepository
        name: jellyfin-helm
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/jellyfin/jellyfin
      tag: latest
      pullPolicy: IfNotPresent
    env:
      TZ: Europe/Berlin
      HTTP_PROXY: http://protonvpn.media.svc.cluster.local:8888
      HTTPS_PROXY: http://protonvpn.media.svc.cluster.local:8888
      NO_PROXY: 127.0.0.1,localhost,.svc,.cluster.local,10.42.0.0/16,10.43.0.0/16
    ingress:
      enabled: true
      className: traefik
      hosts:
        - host: jellyfin.kimimueller.de
          paths:
            - path: /
              pathType: Prefix
        - host: jellyfin.homelab.fritz.box
          paths:
            - path: /
              pathType: Prefix
        - host: jellyfin.homelab.home
          paths:
            - path: /
              pathType: Prefix
    persistence:
      config:
        enabled: true
        existingClaim: "jellyfin-config-pvc"
      media:
        enabled: true
        existingClaim: "media-nfs-pvc"
              
    # Hardware acceleration requires turning off the default securityContext limits
    # The official chart handles security contexts differently than app-template
    securityContext:
      privileged: false
