apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: protonvpn-killswitch
  namespace: media
spec:
  podSelector:
    matchLabels:
      vpn: protonvpn
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: protonvpn
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
