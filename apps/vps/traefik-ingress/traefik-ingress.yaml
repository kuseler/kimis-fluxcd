# /clusters/vps/traefik-ingress.yaml
# Route plain HTTP traffic (entrypoint: web / port 80) to rathole's HTTP service.
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: rathole-http
  namespace: rathole
spec:
  entryPoints:
    - web
  routes:
    - match: HostSNI(`*`)
      services:
        - name: rathole
          port: 80
---
# Route HTTPS / TLS traffic (entrypoint: websecure / port 443) to rathole's
# HTTPS service with TLS passthrough so rathole terminates TLS itself.
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: rathole-https
  namespace: rathole
spec:
  entryPoints:
    - websecure
  routes:
    - match: HostSNI(`*`)
      services:
        - name: rathole
          port: 443
  tls:
    passthrough: true
