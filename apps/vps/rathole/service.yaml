# /apps/rathole/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: rathole
  namespace: rathole
spec:
  type: ClusterIP
  selector:
    app: rathole-server
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP
    - name: control
      port: 2333
      targetPort: 2333
      protocol: TCP
    - name: fritzbox-wg
      port: 51820
      targetPort: 51820
      protocol: UDP
